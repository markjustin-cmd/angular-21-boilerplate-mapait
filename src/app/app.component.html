<div class="app-container bg-white min-vh-100">
    <nav class="navbar navbar-expand navbar-light bg-white border-bottom shadow-sm px-4 py-3" *ngIf="account">
        <div class="container d-flex align-items-center justify-content-between">
            <div class="navbar-nav flex-row">
                <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item nav-link fw-medium me-3 px-2">Home</a>
                <a routerLink="/profile" routerLinkActive="active" class="nav-item nav-link fw-medium me-3 px-2">Profile</a>
                <a *ngIf="account.role === Role.Admin" routerLink="/admin" routerLinkActive="active" class="nav-item nav-link fw-medium px-2">Admin</a>
            </div>
            <div class="d-flex align-items-center">
                <div class="d-none d-md-flex align-items-center me-4">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center me-2" style="width: 32px; height: 32px; font-weight: 600; font-size: 0.85rem;">
                        {{account.firstName?.charAt(0)}}{{account.lastName?.charAt(0)}}
                    </div>
                    <span class="text-dark fw-medium" style="font-size: 0.95rem;">{{account.firstName}} {{account.lastName}}</span>
                </div>
                <button (click)="logout()" class="btn btn-outline-secondary btn-sm px-4 py-2 rounded-pill fw-medium d-flex align-items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-right me-2" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0z"/>
                        <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"/>
                    </svg>
                    Logout
                </button>
            </div>
        </div>
    </nav>
    <router-outlet name="subnav"></router-outlet>
    <alert></alert>
    <router-outlet></router-outlet>
</div>
