<div class="card border-0 shadow-sm rounded-4 mt-4">
    <div class="card-header bg-white border-0 pt-4 pb-0 px-4 px-md-5">
        <h2 class="fw-bold mb-0">My Profile</h2>
    </div>
    <div class="card-body p-4 p-md-5">
        <div class="d-flex align-items-center mb-4" *ngIf="account">
            <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center me-4" style="width: 72px; height: 72px; font-size: 1.75rem; font-weight: 600;">
                {{account.firstName.charAt(0)}}{{account.lastName.charAt(0)}}
            </div>
            <div>
                <h4 class="mb-1 fw-bold">{{account.title}} {{account.firstName}} {{account.lastName}}</h4>
                <p class="text-muted mb-0 d-flex align-items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-envelope me-2" viewBox="0 0 16 16">
                        <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1zm13 2.383-4.708 2.825L15 11.105zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741M1 11.105l4.708-2.897L1 5.383z"/>
                    </svg>
                    {{account.email}}
                </p>
            </div>
        </div>
        <hr class="text-muted opacity-10 my-4">
        <div>
            <a routerLink="update" class="btn btn-primary px-4 py-2 rounded-3 fw-medium">Update Profile</a>
        </div>
    </div>
</div>
