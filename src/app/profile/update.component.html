<div class="card border-0 shadow-sm rounded-4 mt-4">
    <div class="card-header bg-white border-0 pt-4 pb-0 px-4 px-md-5 d-flex align-items-center">
        <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 48px; height: 48px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-person-gear" viewBox="0 0 16 16">
                <path d="M11 5a3 3 0 1 1-6 0 3 3 0 0 1 6 0M8 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4m.256 7a4.5 4.5 0 0 1-.229-1.004H3c.001-.246.154-.986.832-1.664C4.484 10.68 5.711 10 8 10c.26 0 .507.009.74.025.226-.341.496-.65.804-.918C9.077 9.038 8.564 9 8 9c-5 0-6 3-6 4s1 1 1 1zm3.63-4.54c.18-.613 1.048-.613 1.229 0l.043.148a.64.64 0 0 0 .921.382l.136-.074c.561-.306 1.175.308.87.869l-.075.136a.64.64 0 0 0 .382.92l.149.045c.612.18.612 1.048 0 1.229l-.15.043a.64.64 0 0 0-.38.921l.074.136c.305.561-.309 1.175-.87.87l-.136-.075a.64.64 0 0 0-.92.382l-.045.149c-.18.612-1.048.612-1.229 0l-.043-.15a.64.64 0 0 0-.921-.38l-.136.074c-.561.305-1.175-.309-.87-.87l.075-.136a.64.64 0 0 0-.382-.92l-.148-.045c-.613-.18-.613-1.048 0-1.229l.148-.043a.64.64 0 0 0 .382-.921l-.074-.136c-.306-.561.308-1.175.869-.87l.136.075a.64.64 0 0 0 .92-.382zM14 12.5a1.5 1.5 0 1 0-3 0 1.5 1.5 0 0 0 3 0"/>
            </svg>
        </div>
        <h2 class="fw-bold mb-0">Update Profile</h2>
    </div>
    <div class="card-body p-4 p-md-5">
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-medium text-secondary small text-uppercase">First Name</label>
                    <input type="text" formControlName="firstName" class="form-control form-control-lg bg-light border-0" placeholder="Enter first name" />
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-medium text-secondary small text-uppercase">Last Name</label>
                    <input type="text" formControlName="lastName" class="form-control form-control-lg bg-light border-0" placeholder="Enter last name" />
                </div>
                <div class="col-12">
                    <label class="form-label fw-medium text-secondary small text-uppercase">Email Address</label>
                    <input type="email" formControlName="email" class="form-control form-control-lg bg-light border-0" placeholder="Enter email address" />
                </div>
            </div>
            
            <hr class="text-muted opacity-10 my-4">
            
            <div class="d-flex flex-wrap gap-2 align-items-center">
                <button [disabled]="submitting" class="btn btn-primary px-4 py-2 rounded-3 fw-medium d-flex align-items-center">
                    <span *ngIf="submitting" class="spinner-border spinner-border-sm me-2"></span>
                    Update Profile
                </button>
                <a routerLink=".." href="" class="btn btn-light px-4 py-2 rounded-3 fw-medium text-secondary border">Cancel</a>
                
                <div class="ms-auto mt-3 mt-md-0">
                    <button type="button" (click)="onDelete()" [disabled]="deleting" class="btn btn-outline-danger px-4 py-2 rounded-3 fw-medium d-flex align-items-center">
                        <span *ngIf="deleting" class="spinner-border spinner-border-sm me-2"></span>
                        <svg *ngIf="!deleting" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash me-2" viewBox="0 0 16 16">
                            <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                            <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                        </svg>
                        Delete Account
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
