<div class="d-flex align-items-center justify-content-center min-vh-100 bg-white py-5">
    <div class="container" style="max-width: 500px;">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header bg-white border-0 pt-5 pb-2 px-4 px-md-5 text-center">
                <div class="brand-icon mx-auto mb-3" style="width: 48px; height: 48px;">
                    <svg width="48" height="48" viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
                      <path fill="#DD0031" d="M125 30L31.9 63.2l14.2 123.1L125 230l78.9-43.7 14.2-123.1z" />
                      <path fill="#C3002F" d="M125 30v22.2-.1V230l78.9-43.7 14.2-123.1L125 30z" />
                      <path fill="#FFFFFF" d="M125 52.1L66.8 182.6h21.7l11.7-29.2h49.4l11.7 29.2H183L125 52.1zm17 83.3h-34l17-40.9 17 40.9z" />
                    </svg>
                </div>
                <h2 class="fw-bold mb-1">Reset Password</h2>
                <p class="text-muted" *ngIf="tokenStatus == TokenStatus.Valid">Create a new, strong password.</p>
            </div>
            <div class="card-body p-4 p-md-5 pt-0">
                <div *ngIf="tokenStatus == TokenStatus.Validating" class="text-center py-4">
                    <div class="spinner-border text-primary mb-3" role="status"></div>
                    <p class="text-muted">Validating your reset token...</p>
                </div>
                
                <div *ngIf="tokenStatus == TokenStatus.Invalid" class="text-center py-3">
                    <div class="mb-3 text-danger">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-x-circle" viewBox="0 0 16 16">
                            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
                            <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708"/>
                        </svg>
                    </div>
                    <h4 class="fw-bold">Invalid or Expired Token</h4>
                    <p class="text-muted mb-4">The password reset link is invalid or has expired.</p>
                    <a routerLink="/account/forgot-password" class="btn btn-primary px-4 py-2 rounded-3">Request New Link</a>
                </div>
                
                <div *ngIf="tokenStatus == TokenStatus.Valid">
                    <form [formGroup]="form" (ngSubmit)="onSubmit()">
                        <div class="mb-3">
                            <label class="form-label fw-medium text-secondary small text-uppercase">New Password</label>
                            <input type="password" formControlName="password" class="form-control form-control-lg bg-light border-0" placeholder="••••••••" />
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium text-secondary small text-uppercase">Confirm New Password</label>
                            <input type="password" formControlName="confirmPassword" class="form-control form-control-lg bg-light border-0" placeholder="••••••••" />
                        </div>
                        
                        <div class="d-grid gap-3 mb-3">
                            <button [disabled]="loading" class="btn btn-primary btn-lg rounded-3 fw-medium d-flex align-items-center justify-content-center">
                                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                                Reset Password
                            </button>
                        </div>
                        
                        <div class="text-center mt-4">
                            <a routerLink="/account/login" class="text-decoration-none fw-medium text-secondary">Cancel and Return</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
