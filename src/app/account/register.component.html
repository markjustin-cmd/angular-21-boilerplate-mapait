<div class="d-flex align-items-center justify-content-center min-vh-100 bg-white py-5">
    <div class="container" style="max-width: 700px;">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header bg-white border-0 pt-5 pb-2 px-4 px-md-5 text-center">
                <div class="brand-icon mx-auto mb-3" style="width: 48px; height: 48px;">
                    <svg width="48" height="48" viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
                      <path fill="#DD0031" d="M125 30L31.9 63.2l14.2 123.1L125 230l78.9-43.7 14.2-123.1z" />
                      <path fill="#C3002F" d="M125 30v22.2-.1V230l78.9-43.7 14.2-123.1L125 30z" />
                      <path fill="#FFFFFF" d="M125 52.1L66.8 182.6h21.7l11.7-29.2h49.4l11.7 29.2H183L125 52.1zm17 83.3h-34l17-40.9 17 40.9z" />
                    </svg>
                </div>
                <h2 class="fw-bold mb-1">Create an Account</h2>
                <p class="text-muted">Join us today! Please fill in your details below.</p>
            </div>
            <div class="card-body p-4 p-md-5">
                <form [formGroup]="form" (ngSubmit)="onSubmit()">
                    <div class="row g-4 mb-4">
                        <div class="col-md-3">
                            <label class="form-label fw-medium text-secondary small text-uppercase">Title</label>
                            <select formControlName="title" class="form-select form-select-lg bg-light border-0">
                                <option value=""></option>
                                <option value="Mr">Mr</option>
                                <option value="Mrs">Mrs</option>
                                <option value="Miss">Miss</option>
                                <option value="Ms">Ms</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-medium text-secondary small text-uppercase">First Name</label>
                            <input type="text" formControlName="firstName" class="form-control form-control-lg bg-light border-0" placeholder="First Name" />
                        </div>
                        <div class="col-md-5">
                            <label class="form-label fw-medium text-secondary small text-uppercase">Last Name</label>
                            <input type="text" formControlName="lastName" class="form-control form-control-lg bg-light border-0" placeholder="Last Name" />
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-medium text-secondary small text-uppercase">Email Address</label>
                            <input type="email" formControlName="email" class="form-control form-control-lg bg-light border-0" placeholder="name@example.com" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium text-secondary small text-uppercase">Password</label>
                            <input type="password" formControlName="password" class="form-control form-control-lg bg-light border-0" placeholder="••••••••" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium text-secondary small text-uppercase">Confirm Password</label>
                            <input type="password" formControlName="confirmPassword" class="form-control form-control-lg bg-light border-0" placeholder="••••••••" />
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <div class="form-check">
                            <input type="checkbox" formControlName="acceptTerms" class="form-check-input" id="termsCheck" />
                            <label class="form-check-label text-muted" for="termsCheck">I agree to the Terms and Conditions</label>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-3 mb-3">
                        <button [disabled]="submitting" class="btn btn-primary btn-lg rounded-3 fw-medium d-flex align-items-center justify-content-center">
                            <span *ngIf="submitting" class="spinner-border spinner-border-sm me-2"></span>
                            Register Account
                        </button>
                    </div>
                    
                    <div class="text-center mt-4">
                        <p class="text-muted mb-0">Already have an account? <a routerLink="/account/login" class="text-decoration-none fw-medium">Sign in here</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
